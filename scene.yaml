---
vm_state:
  lastHit: None
  hitCount: 0
pulse:
  bpm: 120
  beatsPerBar: 4
inputs:
  sequencer:
    enabled: true
    loopBars: 1
    recordKey: r
    playKey: p
    stopKey: s
    session:
      id: sequencer_demo_session
      version: 1
      tempo:
        bpm: 120.0
        beatsPerBar: 4
      transport:
        mode: stopped
        playheadBeat: 0.0
        loopStartBeat: 0.0
        loopEndBeat: 4.0
        countInBeats: 0
      trackOrder:
      - trk_main
      tracks:
        trk_main:
          id: trk_main
          name: Main
          index: 0
          armed: true
          mute: false
          solo: false
          outputTarget:
            targetType: visman_action
            targetId: 
          defaultQuantize:
            enabled: true
            mode: record
            grid: g1_16
            strength: 1.0
            swing: 0.0
            windowBeats: 
          clipIds:
          - clp_main
          clips:
            clp_main:
              id: clp_main
              trackId: trk_main
              startBeat: 0.0
              lengthBeats: 4.0
              enabled: true
              recordMode: overdub
              quantizeOverride: 
              events:
              - id: evt_seed_kick
                type: trigger
                offsetBeat: 0.25
                beatRaw: 0.25
                beatQuantized: 0.25
                beatFinal: 0.25
                velocity: 1.0
                probability: 1.0
                payload:
                  targetType: visman_action
                  objectId: pad_kick
                  actionName: seq_kick
                createdAtMs: 1700000000000
          inputBindings:
            key:f:
              targetType: visman_action
              objectId: pad_kick
              actionName: seq_kick
            key:j:
              targetType: visman_action
              objectId: pad_snare
              actionName: seq_snare
            key:k:
              targetType: visman_action
              objectId: pad_hat
              actionName: seq_hat
      createdAtMs: 1700000000000
      updatedAtMs: 1700000000000
canvasLayer:
- id: pad_kick
  context: canvas
  type: circle
  position:
    x: 180
    y: 220
  size:
    radius: 56
  style:
    fillStyle: "#243447"
    strokeStyle: "#3ba1ff"
    lineWidth: 3
  callbacks:
    onClick: seq_kick
    onKeyDown:
      f: seq_kick
  actions:
    seq_kick:
      playSound:
        src: assets/audio/drumkit/pearl_master_studio/kick-01.wav
        volume: 1.0
      stateMutations:
      - path: vm.lastHit
        operation: set
        value: Kick
      - path: vm.hitCount
        operation: increment
        value: 1
- id: pad_snare
  context: canvas
  type: circle
  position:
    x: 320
    y: 220
  size:
    radius: 48
  style:
    fillStyle: "#3f2e3e"
    strokeStyle: "#ff6b8a"
    lineWidth: 3
  callbacks:
    onClick: seq_snare
    onKeyDown:
      j: seq_snare
  actions:
    seq_snare:
      playSound:
        src: assets/audio/drumkit/pearl_master_studio/snare-01.wav
        volume: 1.0
      stateMutations:
      - path: vm.lastHit
        operation: set
        value: Snare
      - path: vm.hitCount
        operation: increment
        value: 1
- id: pad_hat
  context: canvas
  type: circle
  position:
    x: 450
    y: 220
  size:
    radius: 42
  style:
    fillStyle: "#384d2c"
    strokeStyle: "#8ad24f"
    lineWidth: 3
  callbacks:
    onClick: seq_hat
    onKeyDown:
      k: seq_hat
  actions:
    seq_hat:
      playSound:
        src: assets/audio/drumkit/pearl_master_studio/hihat-closed.wav
        volume: 0.85
      stateMutations:
      - path: vm.lastHit
        operation: set
        value: Hat
      - path: vm.hitCount
        operation: increment
        value: 1
- id: hud
  context: dom
  type: div
  position:
    x: 18
    y: 18
  properties:
    text: 'SEQ DEMO  |  R=Record P=Play S=Stop  |  F/J/K=Hits  |  Last: {{ @vm.lastHit
      }}  Count: {{ @vm.hitCount }}  Mode: {{ @vm.sequencer.transport.mode }}'
  style:
    color: "#FFFFFF"
    fontSize: 14
